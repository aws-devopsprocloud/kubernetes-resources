apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ebs-dynamic-claim
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ebs-sc
  resources:
    requests:
      storage: 5Gi

--- 

apiVersion: v1
kind: Pod
metadata:
  name: ebs-dynamic
  labels:
    demo: ebs-dynamic
spec:
  containers:
  - name: nginx 
    image: nginx
    volumeMounts:
    - name: ebs-dynamic
      mountPath: /usr/share/nginx/html
  volumes:
  - name: ebs-dynamic
    persistentVolumeClaim:
      claimName: ebs-dynamic-claim
--- 
apiVersion: v1 
kind: Service 
metadata:
  name: ebs-dynamic-service
spec: 
  type: LoadBalancer 
  selector: 
    demo: ebs-dynamic 
  ports: 
  - protocol: TCP
    port: 80 # service port 
    targetPort: 80 # container port 
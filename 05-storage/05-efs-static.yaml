apiVersion: v1
kind: PersistentVolume
metadata:
  name: efs-static-pv
spec:
  capacity:
    storage: 5Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  storageClassName: ""
  persistentVolumeReclaimPolicy: Retain
  csi:
    driver: efs.csi.aws.com
    volumeHandle: fs-0521a17d836097327

--- 
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: efs-static-claim
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ""
  volumeName: efs-static-pv
  resources:
    requests:
      storage: 5Gi

--- 

apiVersion: v1
kind: Pod
metadata:
  name: efs-static-app
  labels: 
    demo: efs-static
spec:
  containers:
  - name: nginx
    image: nginx 
    volumeMounts:
    - name: efs-static
      mountPath: /usr/share/nginx/html
  volumes:
  - name: efs-static
    persistentVolumeClaim:
      claimName: efs-static-claim

--- 
apiVersion: v1 
kind: Service 
metadata:
  name: efs-static-service
spec: 
  type: LoadBalancer 
  selector: 
    demo: efs-static 
  ports: 
  - protocol: TCP
    port: 80 # service port 
    targetPort: 80 # container port 
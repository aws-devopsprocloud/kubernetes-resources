apiVersion: apps/v1 
kind: DaemonSet  
metadata:
  name: hostpath 
  namespace: kube-system 
spec: 
  selector:
    template:
      metadata:
        name: hostpath
      spec:
        containers:
        - name: fluentd 
          image: fluent/fluentd:v1.16-debian-1
          volumeMounts:
          - name: host-logs # volume name 
            mountPath: /host/log/ # where do you want to attach in the pod 

        volumes:
        - name: host-logs 
          hostpoath:
            path: /var/log
            type: Directory

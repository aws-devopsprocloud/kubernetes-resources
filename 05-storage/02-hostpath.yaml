apiVersion: apps/v1 
kind: DaemonSet  
metadata:
  name: hostpath 
  namespace: kube-system 
spec: 
  replicas: 1 
  selector:
    matchLabels:
      app: fluentd   
      demo: hostpath
  template:
    metadata:
      labels:
          app: fluentd   
          demo: hostpath
    spec:
      containers:
      - name: fluentd 
        image: fluent/fluentd:v1.16-debian-1
        volumeMounts:
        - name: host-logs # volume name 
          mountPath: /host/log/ # where do you want to attach in the pod 

      volumes:
      - name: host-logs 
        hostPath:
          path: /var/log
          type: Directory

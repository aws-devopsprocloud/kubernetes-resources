---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: efs-dynamic-claim
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: efs-sc-roboshop
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: Pod
metadata:
  name: efs-dynamic-app
  labels:
    demo: efs-dynamic 
spec:
  containers:
    - name: nginx
      image: nginx 
      volumeMounts:
        - name: efs-dynamic
          mountPath: /usr/share/nginx/html
  volumes:
    - name: efs-dynamic 
      persistentVolumeClaim:
        claimName: efs-dynamic-claim

---
apiVersion: v1 
kind: Service 
metadata:
  name: efs-dynamic-service
spec: 
  type: LoadBalancer 
  selector: 
    demo: efs-dynamic 
  ports: 
  - protocol: TCP
    port: 80 # service port 
    targetPort: 80 # container port
apiVersion: v1 
kind: Pod 
metadata: 
  name: resources-demo
  # namespace: roboshop # We can give the name space 
spec:
  containers: 
  - name: nginx 
    image: nginx 
    ports:
    - containerPort: 80 
    resources:
      requests:
        cpu: "100m"
        memory: "64Mi"
      limits:
        cpu: "250m"
        memory: "128Mi"


